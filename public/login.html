<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Geeko Komputer</title>

    <!-- Tailwind CSS (sama dengan style.css yang sudah ada) -->
    <link rel="stylesheet" href="./css/style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Font Google Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS khusus login -->
    <link rel="stylesheet" href="./css/login.css">
</head>
<body class="bg-gray-50 font-sans antialiased">

    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
            <!-- Header dengan logo -->
            <div class="bg-yellow-400 py-6 text-center">
                <img src="./images/logo.png" alt="Geeko Komputer" class="h-14 mx-auto mb-2">
                <h1 class="text-2xl font-bold text-gray-800">Selamat Datang Kembali</h1>
                <p class="text-gray-700 text-sm">Login ke akun Geeko Anda</p>
            </div>

            <!-- Form Login -->
            <div class="p-6 md:p-8">
                <form id="loginForm">
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">Email</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="email" id="email" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400 transition" placeholder="nama@example.com" autocomplete="email">
                        </div>
                        <div id="emailError" class="text-red-500 text-sm mt-1 hidden"></div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">Password</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="password" id="password" class="w-full pl-10 pr-12 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400 transition" placeholder="••••••••" autocomplete="current-password">
                            <button type="button" id="togglePassword" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div id="passwordError" class="text-red-500 text-sm mt-1 hidden"></div>
                    </div>

                    <div class="flex items-center justify-between mb-6">
                        <label class="flex items-center">
                            <input type="checkbox" id="remember" class="w-4 h-4 text-yellow-500 focus:ring-yellow-400 border-gray-300 rounded">
                            <span class="ml-2 text-sm text-gray-600">Ingat saya</span>
                        </label>
                        <a href="#" id="forgotPasswordLink" class="text-sm text-yellow-600 hover:text-yellow-700 hover:underline">Lupa password?</a>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2">
                        <span>Login</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600">Belum punya akun? 
                        <a href="register.html" class="text-yellow-600 font-semibold hover:underline">Daftar sekarang</a>
                    </p>
                </div>

                <div class="mt-6 pt-4 border-t border-gray-200 text-center">
                    <p class="text-xs text-gray-400">Demo akun:</p>
                    <p class="text-xs text-gray-400">Pelanggan: pelanggan@geeko.com / 123456</p>
                    <p class="text-xs text-gray-400">Teknisi: teknisi@geeko.com / 123456</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast notifikasi -->
    <div id="toast" class="fixed bottom-5 right-5 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg hidden transition-all duration-300 z-50">
        <span id="toastMessage"></span>
    </div>

    <script src="./js/login.js"></script>
</body>
</html>
