<VirtualHost *:80>
    DocumentRoot /var/www/html

    # Alias agar path /COST-APP/... tetap bekerja seperti di XAMPP
    Alias /COST-APP /var/www/html/COST-APP

    <Directory /var/www/html/COST-APP>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Redirect root ke halaman utama
    RedirectMatch ^/$ /COST-APP/src/pages/index.php

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
